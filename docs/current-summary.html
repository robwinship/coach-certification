<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Current Summary | Sarnia Coaches Checker</title>
    <style>
        :root {
            --ink: #10212e;
            --paper: #f6f5ef;
            --card: #ffffff;
            --line: #d7dee4;
            --accent: #0f4e66;
        }
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: var(--paper);
            color: var(--ink);
        }
        .wrap {
            width: min(1200px, 95vw);
            margin: 24px auto 40px;
        }
        .top {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
        }
        h1, h2 { margin: 0; }
        .meta { margin: 8px 0 18px; opacity: 0.8; }
        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .panel {
            border: 1px solid var(--line);
            border-radius: 10px;
            overflow: auto;
            margin-top: 12px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 760px;
        }
        th, td {
            text-align: left;
            padding: 10px 12px;
            border-bottom: 1px solid var(--line);
            vertical-align: top;
        }
        th {
            background: #edf3f7;
            font-size: 0.9rem;
        }
        .empty {
            margin: 8px 0 0;
            opacity: 0.75;
            font-style: italic;
        }
        a { color: var(--accent); }
    </style>
</head>
<body>
    <main class="wrap">
        <div class="top">
            <h1>Current Summary</h1>
            <a href="./index.html">Back to dashboard</a>
        </div>
        <p class="meta">As of 2026-03-15 | Certified: 0 | In Progress: 0</p>

        <section class="card">
            <h2>Detected Transitions</h2>
            <p class="empty">No new in-progress to certified transitions detected.</p>
        </section>

        <section class="card">
            <h2>Certified Coaches</h2>
            <p class="empty">No rows found.</p>
        </section>

        <section class="card">
            <h2>In Progress Coaches</h2>
            <p class="empty">No rows found.</p>
        </section>
    </main>
</body>
</html>
