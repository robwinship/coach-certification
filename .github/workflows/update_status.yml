name: Update Sarnia Coach Status

on:
  schedule:
    # GitHub Actions cron is UTC. These map to 11:00 AM and 5:00 PM EST.
    - cron: "0 16 * * *"
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-status:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Regenerate status data
        run: python check_multi.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/status.json docs/current-summary.html
          git diff --cached --quiet && exit 0
          git commit -m "Update status data"
          git push
